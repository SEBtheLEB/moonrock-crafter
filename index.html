<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#102033" />
    <title>Moonrock Crafter</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/img/moonrock-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/img/apple-touch-icon.png" />
    <link rel="stylesheet" href="./src/styles/base.css?v=158" />
    <link rel="stylesheet" href="./src/styles/ui.css?v=158" />
    <link rel="stylesheet" href="./src/styles/station.css?v=158" />
    <link rel="stylesheet" href="./src/styles/navigation.css?v=158" />
    <link rel="stylesheet" href="./src/styles/mining.css?v=158" />
    <link rel="stylesheet" href="./src/styles/upgrades.css?v=158" />
    <link rel="stylesheet" href="./src/styles/storage.css?v=158" />
    <link rel="stylesheet" href="./src/styles/island.css?v=158" />
  </head>
  <body>
    <div id="game-shell" class="game-shell">
      <canvas id="game-canvas" aria-label="Moonrock Crafter playfield"></canvas>
      <div id="ui-root" class="ui-root" aria-live="polite"></div>
      <div class="rotate-device-overlay" aria-hidden="true">
        <div class="rotate-card">
          <div class="rotate-icon"></div>
          <h1>Turn the station sideways</h1>
          <p>Moonrock Crafter is PC-first now, with mobile landscape support kept ready for later.</p>
        </div>
      </div>
    </div>
    <noscript>Moonrock Crafter needs JavaScript enabled.</noscript>
    <script>
      window.addEventListener('error', (event) => {
        const report = document.createElement('pre');
        report.style.cssText = 'position:fixed;inset:12px;z-index:99999;overflow:auto;padding:14px;background:#12080f;color:#ffd36b;border:1px solid #ff8f3d;font:13px/1.4 monospace;white-space:pre-wrap;';
        report.textContent = `Moonrock boot error\n${event.message}\n${event.filename}:${event.lineno}:${event.colno}`;
        document.body.append(report);
      });
      window.addEventListener('unhandledrejection', (event) => {
        const report = document.createElement('pre');
        report.style.cssText = 'position:fixed;inset:12px;z-index:99999;overflow:auto;padding:14px;background:#12080f;color:#ffd36b;border:1px solid #ff8f3d;font:13px/1.4 monospace;white-space:pre-wrap;';
        report.textContent = `Moonrock async boot error\n${event.reason?.stack || event.reason}`;
        document.body.append(report);
      });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const localHosts = new Set(['localhost', '127.0.0.1', '::1']);
          if (localHosts.has(location.hostname)) {
            Promise.all([
              navigator.serviceWorker.getRegistrations()
                .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister()))),
              window.caches
                ? caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
                : Promise.resolve(),
            ]).catch(() => {});
            return;
          }
          navigator.serviceWorker.register('./service-worker.js?v=169').catch(() => {});
        });
      }
    </script>
    <script type="module" src="./src/main.js?v=158"></script>
  </body>
</html>
